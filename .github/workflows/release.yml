name: AIDR Release Pipeline

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-gate:
    name: Test, Benchmark, and Package Extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Test Suite & Release Gate
        run: node scripts/aidr-release-gate.js

      - name: Package Production Zip
        run: node scripts/aidr-package.js

      - name: Upload Packaged Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aidr-production-extension
          path: dist/aidr-v*.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/aidr-v*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
