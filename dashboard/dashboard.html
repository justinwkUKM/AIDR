<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AIDR</title>
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <main class="app">
      <header class="top">
        <h1>AIDR</h1>
        <div id="policy-meta" class="chip">mode: enforcement</div>
      </header>

      <section class="controls">
        <select id="severity-filter">
          <option value="all">Severity: all</option>
          <option value="critical">Severity: critical</option>
          <option value="high">Severity: high</option>
          <option value="medium">Severity: medium</option>
          <option value="low">Severity: low</option>
          <option value="safe">Severity: safe</option>
        </select>
        <select id="category-filter">
          <option value="all">Category: all</option>
          <option value="sensitive_data">sensitive_data</option>
          <option value="prompt_injection">prompt_injection</option>
          <option value="jailbreak">jailbreak</option>
          <option value="exfiltration">exfiltration</option>
          <option value="harmful_content">harmful_content</option>
          <option value="behavioral">behavioral</option>
        </select>
      </section>

      <section class="actions">
        <button id="policy-toggle-mode-btn">toggle mode</button>
        <button id="policy-pause-btn">pause 15m</button>
        <button id="policy-resume-btn">resume</button>
      </section>

      <section class="actions">
        <button id="refresh-btn">refresh</button>
        <button id="export-json-btn">json</button>
        <button id="export-csv-btn">csv</button>
      </section>

      <section class="diagnostics">
        <div class="diag-head">
          <h2>Diagnostics</h2>
          <button id="recompute-diagnostics-btn">recompute</button>
        </div>
        <input id="diagnostics-file-input" type="file" accept="application/json,.json" />
        <div id="diagnostics-meta" class="diag-meta">No diagnostics.</div>
        <div id="diagnostics-grid" class="diag-grid"></div>
      </section>

      <section class="stats">
        <div id="event-count">0 events</div>
      </section>

      <section class="timeline" id="timeline"></section>

      <section class="diagnostics">
        <div class="diag-head"><h2>Allowlist</h2></div>
        <input id="policy-allow-rule-input" type="text" placeholder="rule id" />
        <button id="policy-allow-rule-btn">add rule</button>
        <input id="policy-allow-pattern-input" type="text" placeholder="pattern" />
        <button id="policy-allow-pattern-btn">add pattern</button>
      </section>
    </main>

    <script src="dashboard.js"></script>
  </body>
</html>
