<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AIDR Dashboard</title>
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <main class="app">
      <header class="top">
        <h1>AIDR Dashboard</h1>
        <p>Timeline and filters for local risk events</p>
      </header>

      <section class="controls">
        <label>
          Severity
          <select id="severity-filter">
            <option value="all">All</option>
            <option value="critical">Critical</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
            <option value="safe">Safe</option>
          </select>
        </label>

        <label>
          Category
          <select id="category-filter">
            <option value="all">All</option>
            <option value="sensitive_data">Sensitive Data</option>
            <option value="prompt_injection">Prompt Injection</option>
            <option value="jailbreak">Jailbreak</option>
            <option value="exfiltration">Exfiltration</option>
            <option value="harmful_content">Harmful Content</option>
            <option value="behavioral">Behavioral</option>
          </select>
        </label>
      </section>

      <section class="actions">
        <button id="refresh-btn">Refresh</button>
        <button id="export-json-btn">Export JSON</button>
        <button id="export-csv-btn">Export CSV</button>
      </section>

      <section class="diagnostics">
        <div class="diag-head">
          <h2>Policy Controls</h2>
        </div>
        <div class="diag-meta" id="policy-meta">mode: enforcement</div>
        <div class="actions">
          <button id="policy-toggle-mode-btn">Toggle Mode</button>
          <button id="policy-pause-btn">Pause 15m</button>
          <button id="policy-resume-btn">Resume</button>
        </div>
        <div class="diag-upload">
          <label for="policy-allow-rule-input">Allowlist Rule ID</label>
          <input id="policy-allow-rule-input" type="text" />
          <button id="policy-allow-rule-btn">Add Rule ID</button>
        </div>
        <div class="diag-upload">
          <label for="policy-allow-pattern-input">Allowlist Pattern</label>
          <input id="policy-allow-pattern-input" type="text" />
          <button id="policy-allow-pattern-btn">Add Pattern</button>
        </div>
      </section>

      <section class="stats">
        <div id="event-count">0 events</div>
      </section>

      <section class="diagnostics">
        <div class="diag-head">
          <h2>Diagnostics</h2>
          <button id="recompute-diagnostics-btn">Recompute</button>
        </div>
        <div class="diag-upload">
          <label for="diagnostics-file-input">Labeled Dataset (JSON)</label>
          <input id="diagnostics-file-input" type="file" accept="application/json,.json" />
        </div>
        <div id="diagnostics-meta" class="diag-meta">No diagnostics computed yet.</div>
        <div id="diagnostics-grid" class="diag-grid"></div>
      </section>

      <section class="timeline" id="timeline"></section>
    </main>

    <script src="dashboard.js"></script>
  </body>
</html>
